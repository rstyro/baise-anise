<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      xmlns:sa="http://www.thymeleaf.org/extras/sa-token">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <title>菜单按钮</title>
    <!-- element-ui 引入样式 -->
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css"
          th:href="@{/static/element-ui/index.css}">
    <style>
        .container {
            padding: 5px;
        }

        .container .search-box {
            margin-bottom: 20px;
        }

        .container .content-header {
            margin-bottom: 10px;
        }

        .container .content-header .content-header-right {
            text-align: right;
        }
    </style>
</head>
<body>

<div id="app" class="container">
    <el-card class="box-card search-box" v-show="showSearch">
        <el-form :inline="true" :model="formDto" class="demo-form-inline">
            <el-form-item label="层级">
                <el-select v-model="formDto.level" placeholder="请选择层级: ">
                    <el-option label="全部" value=""></el-option>
                    <el-option label="省级" :value="1"></el-option>
                    <el-option label="市级" :value="2"></el-option>
                    <el-option label="区/县" :value="3"></el-option>
                    <el-option label="街道" :value="4"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="父级编码">
                <el-input v-model="formDto.parentCode" placeholder="请输入父级编码"></el-input>
            </el-form-item>

            <el-form-item label="关键词检索">
                <el-input v-model="formDto.keyword" placeholder="请输入关键词"></el-input>
            </el-form-item>
            <el-form-item>
                <el-button type="primary" @click="searchList">查询</el-button>
            </el-form-item>
        </el-form>
    </el-card>

    <el-card class="box-card">
        <section class="content-header">
            <el-row :gutter="2">
                <el-col :span="11">
                    <el-button sa:hasPermissionOr="base:baseRegion:list:add,admin" @click="add" type="success"
                               size="mini" icon="el-icon-plus">新增
                    </el-button>
                    <el-button sa:hasPermissionOr="base:baseRegion:list:del,admin" @click="batchDel" type="danger"
                               size="mini" icon="el-icon-delete">删除
                    </el-button>
                </el-col>
                <div class="content-header-right">
                    <el-button type="primary" @click="showSearchBox" size="mini" icon="el-icon-search"
                               circle></el-button>
                </div>
            </el-row>

        </section>

        <!-- Main content -->
        <section class="content">
            <el-table
                    :data="tableData"
                    style="width: 100%;margin-bottom: 20px;"
                    row-key="id"
                    border
                    @selection-change="handleSelectionChange"
            >
                <el-table-column type="selection" width="55"></el-table-column>
                <el-table-column prop="id" label="主键" width="100"></el-table-column>
                <el-table-column prop="code" label="行政代码" width="100"></el-table-column>
                <el-table-column prop="name" label="名称" width="100"></el-table-column>
                <el-table-column prop="level" label="层级" >
                    <template slot-scope="scope">
                        <span v-if="scope.row.level==1">省级（省份、直辖市、自治区）</span>
                        <span v-if="scope.row.level==2">地级（城市）</span>
                        <span v-if="scope.row.level==3">县级（区县）</span>
                        <span v-if="scope.row.level==4">乡级（乡镇、街道）</span>
                    </template>
                </el-table-column>
                <el-table-column prop="parentCode" label="上级行政代码" width="200"></el-table-column>
                <el-table-column prop="remark" label="备注" ></el-table-column>
                <el-table-column
                        fixed="right"
                        label="操作"
                        width="140">
                    <template slot-scope="scope">
                        <el-tooltip sa:hasPermissionOr="base:baseRegion:list:edit,admin" class="item" effect="dark"
                                    content="编辑" placement="top-start">
                            <el-button @click="edit(scope.row)" type="primary" icon="el-icon-edit" size="mini"
                                       circle></el-button>
                        </el-tooltip>
                        <el-tooltip sa:hasPermissionOr="base:baseRegion:list:del,admin" class="item" effect="dark"
                                    content="删除" placement="top-start">
                            <el-button v-if="scope.row.username != 'admin'" @click="del(scope.row.id)" type="danger"
                                       icon="el-icon-delete" size="mini"
                                       circle></el-button>
                        </el-tooltip>
                    </template>
                </el-table-column>
            </el-table>

            <div class="page-box" v-show="pageDto.pageCount>1">
                <el-pagination
                        @size-change="handleSizeChange"
                        @current-change="handleCurrentChange"
                        @prev-click="prePage"
                        @next-click="nextPage"
                        :current-page="pageDto.currentPage"
                        :page-size="pageDto.pagerCount"
                        :page-count="pageDto.pageCount"
                        :pager-count="pageDto.pagerCount"
                        layout="sizes,prev, pager, next"
                        :page-sizes="[10, 20, 30, 40, 50, 100]"
                        :total="pageDto.total">
                </el-pagination>
            </div>
        </section>
    </el-card>


    <el-dialog :title="dialogTitle" :visible.sync="addDialogVisible">
        <el-form :model="itemData" :rules="rules" ref="itemData">

            <el-form-item label="id" prop="id" :label-width="formLabelWidth" style="display: none">
                <el-input v-model="itemData.id" autocomplete="off"></el-input>
            </el-form-item>

            <el-form-item label="行政代码" prop="code" :label-width="formLabelWidth">
                <el-input v-model="itemData.code" autocomplete="off" placeholder="请输入行政代码"></el-input>
            </el-form-item>

            <el-form-item label="名称" prop="name" :label-width="formLabelWidth">
                <el-input v-model="itemData.name" autocomplete="off" placeholder="请输入名称"></el-input>
            </el-form-item>

            <el-form-item label="层级:" prop="level" :label-width="formLabelWidth">
                <el-select v-model="itemData.level" placeholder="请选择层级: 1-省, 2-市, 3-区/县, 4-乡镇/街道">
                    <el-option label="省级" :value="1"></el-option>
                    <el-option label="市级" :value="2"></el-option>
                    <el-option label="区/县" :value="3"></el-option>
                    <el-option label="街道" :value="4"></el-option>
                </el-select>
            </el-form-item>

            <el-form-item label="上级行政代码" prop="parentCode" :label-width="formLabelWidth">
                <el-input v-model="itemData.parentCode" autocomplete="off" placeholder="请输入上级行政代码"></el-input>
            </el-form-item>

            <el-form-item label="备注" prop="remark" :label-width="formLabelWidth">
                <el-input type="textarea" v-model="itemData.remark" autocomplete="off"
                          placeholder="请输入备注"></el-input>
            </el-form-item>
        </el-form>
        <div slot="footer" class="dialog-footer">
            <el-button type="primary" @click="saveOrUpdate">{{dialogTitle}}</el-button>
        </div>
    </el-dialog>

</div>
<!-- element-ui -->
<script src="https://unpkg.com/vue@2/dist/vue.js" th:src="@{/static/vue/vue.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js" th:src="@{/static/vue/axios.min.js}"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/element-ui/lib/index.js" th:src="@{/static/element-ui/index.js}"></script>
<script th:src="@{/static/vue/api.js}"></script>
<script type="text/javascript" th:inline="javascript">
    let ctx = [[@{/}]];
        new Vue({
            el: '#app',
            data: function () {
                return {
                    listUrl: ctx + 'base/baseRegion/list',
                    delUrl: ctx + 'base/baseRegion/del?id=',
                    batchDelUrl: ctx + 'base/baseRegion/batchDel',
                    addUrl: ctx + 'base/baseRegion/add',
                    editUrl: ctx + 'base/baseRegion/edit',
                    dialogUrl: '',
                    tableData: [],
                    multipleSelection: [],
                    formDto: {
                        keyword: '',
                        region: ''
                    },
                    showSearch: false,
                    pageDto: {
                        currentPage: 1,
                        pageSize: 10,
                        total: 110,
                        pageCount: 1, //总页数
                        pagerCount: 9, //页码按钮的数量
                    },
                    addDialogVisible: false,
                    itemData: {
                        menuIdList: [],
                    },
                    dialogTitle: '新增',
                    formLabelWidth: '100px',
                    formTimeLabelWidth: '120px',
                    pickerOptions: {
                        disabledDate(time) {
                            return time.getTime() > Date.now();
                        },
                        shortcuts: [{
                            text: '今天',
                            onClick(picker) {
                                picker.$emit('pick', new Date());
                            }
                        }, {
                            text: '昨天',
                            onClick(picker) {
                                const date = new Date();
                                date.setTime(date.getTime() - 3600 * 1000 * 24);
                                picker.$emit('pick', date);
                            }
                        }, {
                            text: '一周前',
                            onClick(picker) {
                                const date = new Date();
                                date.setTime(date.getTime() - 3600 * 1000 * 24 * 7);
                                picker.$emit('pick', date);
                            }
                        }]
                    },
                    rules: {
                        code: [
                            {required: true, message: '请输入行政代码', trigger: 'blur'},
                        ],
                        name: [
                            {required: true, message: '请输入名称', trigger: 'blur'},
                        ],
                        level: [
                            {required: true, message: '请输入层级: 1-省, 2-市, 3-区/县, 4-乡镇/街道', trigger: 'blur'},
                        ],
                        parentCode: [
                            {required: true, message: '请输入上级行政代码', trigger: 'blur'},
                        ],
                    }

                }
            },
            methods: {
                searchList: function () {
                    this.pageDto.currentPage=1;
                    this.requestData();
                },
                requestData: function () {
                    // 列表检索
                    let url = this.listUrl + '?pageNum=' + this.pageDto.currentPage + '&pageSize=' + this.pageDto.pageSize;
                    axios.post(url, this.formDto).then(r => {
                        if (r.data.code === 200) {
                            let data = r.data.data;
                            this.pageDto.total = Number(data.total);
                            this.pageDto.pageCount = Number(data.pages);
                            this.tableData = data.records;
                        }
                    }).catch(error => {
                        console.error("请求失败：", error);
                        ELEMENT.Message({
                            showClose: true,
                            message: "请求失败，请稍后重试",
                            type: 'error'
                        });
                    })
                },
                prePage() {
                    this.pageDto.currentPage -= 1;
                    this.requestData();
                },
                nextPage() {
                    this.pageDto.currentPage += 1;
                    this.requestData();
                },
                handleSizeChange(val) {
                    this.pageDto.pageSize = val;
                    this.requestData();
                },
                handleCurrentChange(val) {
                    this.pageDto.currentPage = val;
                    this.requestData();
                },
                handleSelectionChange(val) {
                    //当选择项发生变化时会触发该事件
                    this.multipleSelection = val;
                },
                showSearchBox() {
                    this.showSearch = !this.showSearch;
                },
                add() {
                    this.addDialogVisible = true;
                    this.dialogTitle = '新增';
                    this.dialogUrl = this.addUrl;
                    this.itemData = {};
                },
                edit(row) {
                    this.addDialogVisible = true;
                    this.dialogTitle = '编辑';
                    this.itemData = row;
                    this.dialogUrl = this.editUrl;
                },
                saveOrUpdate() {
                    this.$refs['itemData'].validate((valid) => {
                        if (valid) {
                            requestPost(this.dialogUrl, this.itemData);
                        } else {
                            return false;
                        }
                    });
                },
                batchDel() {
                    let ids = this.multipleSelection.map(i => i.id);
                    if (!ids.length) {
                        // 数组为空
                        ELEMENT.Message({
                            showClose: true,
                            message: "您未选中任何内容",
                            type: 'warning'
                        });
                        return false;
                    }
                    ELEMENT.MessageBox.confirm('确定删除选中的列表数据?', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    }).then(() => {
                        requestPost(this.batchDelUrl, ids);
                    }).catch(() => {
                        ELEMENT.Message({
                            type: 'info',
                            message: '已取消删除'
                        });
                    });
                },
                del(id) {
                    ELEMENT.MessageBox.confirm('确定删除该数据吗?', '提示', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    }).then(() => {
                        requestGet(this.delUrl + id);
                    }).catch(() => {
                        ELEMENT.Message({
                            type: 'info',
                            message: '已取消删除'
                        });
                    });
                }
            }, created() {
                this.searchList();
            }
        });
</script>

</body>
</html>
